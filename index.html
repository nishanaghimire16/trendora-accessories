<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trendora Accessories</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f8f8f8;
      color: #333;
    }

    header {
      background: #000;
      color: #fff;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 20px;
    }

    .container {
      padding: 40px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      width: 280px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover; /* important fix */
      border-radius: 10px;
    }

    .card h3 {
      margin: 15px 0 5px;
    }

    .card p {
      font-size: 14px;
      color: #777;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 18px;
      background: #000;
      color: #fff;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      background: #000;
      color: #fff;
    }
  </style>
</head>

<body>

  <header>
    <h1>Trendora Accessories</h1>
  </header>

  <div class="container">
    <h2>🔥 Trending Now</h2>

    <div class="cards">

      <!-- Card 1 -->
      <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Shoes">
        <h3>Stylish Shoes</h3>
        <p>Upgrade your look with trendy sneakers</p>
        <a href="#" class="btn">Shop Now</a>
      </div>

      <!-- Card 2 -->
      <div class="card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="Watch">
        <h3>Luxury Watch</h3>
        <p>Upgrade your style with class</p>
        <a href="#" class="btn">Shop Now</a>
      </div>

      <!-- Card 3 -->
      <div class="card">
        <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3" alt="Bag">
        <h3>Trendy Handbag</h3>
        <p>Perfect match for your outfit</p>
        <a href="#" class="btn">Shop Now</a>
      </div>

    </div>
  </div>

  <footer>
    © 2026 Trendora Accessories | Follow us on Instagram ❤️
  </footer>

</body>
</html>
